// ─── EmailJS Config ───
const EMAILJS_SERVICE = "service_payfair";
const EMAILJS_TEMPLATE = "template_invite";
const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY";

function sendInviteEmail(toEmail, toName, teamName, managerName, amount, inviteLink) {
  // If EmailJS is configured, send real email
  if (EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY" && window.emailjs) {
    return window.emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      to_email: toEmail, to_name: toName, team_name: teamName,
      manager_name: managerName, amount: amount, invite_link: inviteLink,
    }, EMAILJS_PUBLIC_KEY);
  }
  // Demo mode: simulate
  return new Promise(r => setTimeout(() => r({status:200,text:"Demo mode"}), 500));
}

// ─── Data Store (in-memory, persists during session) ───
const Store = {
  teams: [],
  currentTeam: null,
  currentUser: null,

  createTeam(data) {
    const team = {
      id: Date.now().toString(36),
      ...data,
      roster: [],
      transactions: [],
      fundPerFamily: 0,
      totalFund: 0,
      createdAt: new Date().toISOString(),
      cardNumber: `4832 ${Math.floor(1000+Math.random()*9000)} ${Math.floor(1000+Math.random()*9000)} ${Math.floor(1000+Math.random()*9000)}`,
      cardLast4: "",
    };
    team.cardLast4 = team.cardNumber.slice(-4);
    this.teams.push(team);
    this.currentTeam = team;
    return team;
  },

  addRosterEntry(teamId, entry) {
    const team = this.teams.find(t => t.id === teamId);
    if (team) {
      const re = { id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), ...entry,
        paymentPlan: null, paymentsMade: [], paidAmount: 0, onTrack: null, invited: false, registered: false,
        hardshipPledge: 0, hardshipUsed: 0, photo: null };
      team.roster.push(re);
      return re;
    }
  },

  setFund(teamId, perFamily) {
    const team = this.teams.find(t => t.id === teamId);
    if (team) {
      team.fundPerFamily = perFamily;
      team.totalFund = perFamily * team.roster.length;
    }
  },

  addTransaction(teamId, txn) {
    const team = this.teams.find(t => t.id === teamId);
    if (team) {
      team.transactions.push({ id: Date.now().toString(36), date: new Date().toISOString().slice(0,10), ...txn });
    }
  },
};

const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n);
const fmtDate = d => new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

// ─── Components ───
const Btn = ({children,onClick,variant="primary",full,small,disabled,style:sx}) => {
  const base = {border:"none",borderRadius:10,fontWeight:700,cursor:disabled?"default":"pointer",transition:"all 0.15s",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,opacity:disabled?0.4:1,width:full?"100%":"auto",fontSize:small?13:15,padding:small?"10px 18px":"14px 28px",letterSpacing:"-0.01em"};
  const v = {
    primary:{...base,background:C.gradientBtn,color:C.white,boxShadow:C.shadow2},
    accent:{...base,background:C.gradientAccent,color:C.navy,boxShadow:"0 4px 14px rgba(0,212,170,0.3)"},
    secondary:{...base,background:C.navy,color:C.white},
    outline:{...base,background:"transparent",color:C.text,border:`1.5px solid ${C.border}`},
    ghost:{...base,background:"transparent",color:C.textSec,padding:small?"8px 14px":"10px 18px"},
    danger:{...base,background:C.redBg,color:C.red,border:`1px solid ${C.red}20`},
  };
  return <button style={{...v[variant],...sx}} onClick={disabled?undefined:onClick}>{children}</button>;
};

const Card = ({children,style:sx,onClick,className}) => (
  <div onClick={onClick} className={className} style={{background:C.surface,borderRadius:12,padding:20,boxShadow:C.shadowCard,border:`1px solid ${C.borderLight}`,cursor:onClick?"pointer":"default",transition:"all 0.15s",...sx}}>{children}</div>
);

);

const Input = ({label,value,onChange,type="text",placeholder,icon,multiline,disabled}) => (
  <div style={{marginBottom:18}}>
    {label && <label style={{...T.label,display:"block",marginBottom:8,fontSize:11}}>{label}</label>}
    <div style={{position:"relative"}}>
      {multiline ?
        <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled} rows={3} style={{width:"100%",padding:"14px 16px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:15,fontWeight:500,color:C.text,background:disabled?C.bg:C.white,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}} /> :
        <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled} style={{width:"100%",padding:"14px 16px",paddingLeft:icon?44:16,border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:15,fontWeight:500,color:C.text,background:disabled?C.bg:C.white,outline:"none",boxSizing:"border-box",transition:"border 0.15s"}} onFocus={e=>e.target.style.borderColor=C.navy} onBlur={e=>e.target.style.borderColor=C.border} />

      {icon && <div style={{position:"absolute",left:14,top:multiline?18:"50%",transform:multiline?"none":"translateY(-50%)"}}>{icon}</div>}

const Progress = ({value,max,color=C.accent,height=6}) => (

    <div style={{width:`${Math.min((value/max)*100,100)}%`,height:"100%",background:color,borderRadius:3,transition:"width 0.5s ease"}} />

);

const Avatar = ({name,size=40,src}) => {
  if(src) return <img src={src} style={{width:size,height:size,borderRadius:8,objectFit:"cover"}} />;
  const initials = name.split(" ").map(n=>n[0]).join("").slice(0,2);
  const hues = [220,200,180,240,160,280];
  const h = hues[name.length%hues.length];
  return <div style={{width:size,height:size,borderRadius:8,background:`hsl(${h},50%,25%)`,display:"flex",alignItems:"center",justifyContent:"center",color:`hsl(${h},60%,80%)`,fontWeight:800,fontSize:size*0.36,flexShrink:0}}>{initials}</div>;
};

const Modal = ({open,onClose,children}) => {

        <div style={{width:36,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}} />
        {children}

    </div>
  );
};

                <span>Convenience fee</span><span>{fmt(PLANS[selectedPlan].feePerInstallment)} × {PLANS[selectedPlan].installments} = {fmt(PLANS[selectedPlan].feePerInstallment*PLANS[selectedPlan].installments)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,marginTop:10,paddingTop:10,borderTop:`1.5px solid ${C.border}`,fontSize:15}}>
                <span>Total</span><span>{fmt((parentOwed||1000)+PLANS[selectedPlan].feePerInstallment*PLANS[selectedPlan].installments)}</span>
              </div>
            </div>
          )}
        </Card>

        {/* Payment Method */}
        {selectedPlan!==null&&(
          <Card style={{marginBottom:20,padding:20}}>
            <div style={{...T.label,fontSize:10,marginBottom:14}}>Payment Method</div>
            <div style={{display:"flex",gap:8}}>
              {[["card","Credit Card",<Icon name="creditCard" size={18} color={payMethod==="card"?C.white:C.steel}/>],
                ["debit","Debit Card",<Icon name="card" size={18} color={payMethod==="debit"?C.white:C.steel}/>],
                ["ach","Bank ACH",<Icon name="bank" size={18} color={payMethod==="ach"?C.white:C.steel}/>]
              ].map(([id,label,icon])=>(
                <div key={id} onClick={()=>setPayMethod(id)} style={{flex:1,padding:"14px 8px",borderRadius:10,border:`1.5px solid ${payMethod===id?C.navy:C.border}`,background:payMethod===id?C.navy:C.white,cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
                  <div style={{marginBottom:6}}>{icon}</div>
                  <div style={{fontSize:11,fontWeight:700,color:payMethod===id?C.white:C.textSec}}>{label}</div>
                </div>
              ))}
            </div>
          </Card>
        )}

        <Btn full onClick={()=>{setParentPaySetup(true);nav("parentDash")}} disabled={selectedPlan===null||!payMethod}>
          {selectedPlan===0?"Pay Now":"Set Up Payment Plan"}
        </Btn>
      </div>
    </div>
  );

  // ═══ PARENT DASHBOARD ═══
  if(screen==="parentDash") {
    const plan = selectedPlan!==null?PLANS[selectedPlan]:PLANS[3];
    const instAmt = plan.installments===1?parentTotal:Math.ceil(parentTotal/plan.installments);
    const made = plan.installments===1?1:5;
    const total = plan.installments;

    return (
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{background:C.gradient,padding:"20px 24px 68px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>{teamName||"Eastside Thunder 14U"}</div>
              <div style={{color:C.white,fontSize:22,fontWeight:900,letterSpacing:"-0.02em",marginTop:4}}>Hi, {parentName.split(" ")[0]}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{width:40,height:40,borderRadius:10,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Icon name="bell" size={18} color="rgba(255,255,255,0.6)"/></div>
              <div onClick={()=>{}} style={{cursor:"pointer"}}><Avatar name={parentName} size={40} src={parentPhoto}/></div>
            </div>
          </div>
        </div>

        <div style={{padding:"0 20px",marginTop:-48}}>
          <Card style={{marginBottom:14,padding:22}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{...T.caption,marginBottom:4}}>My Progress</div>
                <div style={{fontSize:30,fontWeight:900,letterSpacing:"-0.03em"}}>{fmt(parentPaid)}</div>
                <div style={{fontSize:13,color:C.textMuted,fontWeight:600}}>of {fmt(parentTotal)}</div>
              </div>
              <Badge label={plan.installments===1?"Paid":`${made}/${total}`} color={made===total?C.green:C.accent} bg={made===total?C.greenBg:C.accentGlow}/>
            </div>
            <Progress value={parentPaid} max={parentTotal} height={8} color={C.green}/>
            {plan.installments>1&&(
              <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:12,color:C.textMuted,fontWeight:600}}>
                <span>Next: {fmt(instAmt)} · Mar 1</span><span>{total-made} left</span>
              </div>
            )}
          </Card>

          <TabBar tabs={[{id:"dashboard",label:"Dashboard"},{id:"fund",label:"Fund Activity"},{id:"profile",label:"Profile"}]} active={pTab} onSelect={setPTab}/>

          {pTab==="dashboard"&&(
            <div>
              <Card style={{marginBottom:10,padding:16}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Avatar name={mgrName||"Mike Johnson"} size={44}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{mgrName||"Coach Mike Johnson"}</div>
                    <div style={{fontSize:12,color:C.textMuted,fontWeight:500}}>Team Manager · {mgrPhone||"(555) 012-3456"}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <a href={`tel:${mgrPhone}`} style={{width:36,height:36,borderRadius:8,background:C.bg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="phone" size={15} color={C.steel}/></a>
                    <a href={`mailto:${mgrEmail}`} style={{width:36,height:36,borderRadius:8,background:C.bg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="mail" size={15} color={C.steel}/></a>
                  </div>
                </div>
              </Card>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                <Card style={{padding:16,textAlign:"center",cursor:"pointer"}} onClick={()=>setHardshipOpt(!hardshipOpt)}>
                  <Icon name="heart" size={22} color={C.accent}/>
                  <div style={{fontWeight:700,fontSize:13,marginTop:8}}>Help a Family</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:2,fontWeight:500}}>Anonymous contribution</div>
                </Card>
                <Card style={{padding:16,textAlign:"center",cursor:"pointer"}} onClick={()=>setShowHardship(!showHardship)}>
                  <Icon name="shield" size={22} color={C.orange}/>
                  <div style={{fontWeight:700,fontSize:13,marginTop:8}}>Need Help?</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:2,fontWeight:500}}>Hardship assistance</div>
                </Card>
              </div>

              {hardshipOpt&&(
                <Card className="fade-in" style={{marginBottom:14,background:C.offWhite,border:`1px solid ${C.accent}25`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                    <Icon name="heart" size={16} color={C.accent}/>
                    <span style={{fontWeight:800,fontSize:14}}>Help a Family in Need</span>
                  </div>
                  <p style={{fontSize:13,color:C.textSec,marginBottom:14,lineHeight:1.5,fontWeight:500}}>Anonymous contribution for teammates facing hardship. Only charged during end-of-season reconciliation if needed.</p>
                  <div style={{display:"flex",gap:6,marginBottom:14}}>
                    {["50","100","150"].map(amt=>(
                      <button key={amt} onClick={()=>setHardshipAmt(amt)} style={{flex:1,padding:"10px 0",border:`1.5px solid ${hardshipAmt===amt?C.navy:C.border}`,borderRadius:8,background:hardshipAmt===amt?C.navy:"transparent",color:hardshipAmt===amt?C.white:C.textSec,fontWeight:700,fontSize:14,cursor:"pointer"}}>${amt}</button>
                    ))}
                  </div>
                  <Btn variant="accent" full small>Pledge {fmt(parseInt(hardshipAmt))}</Btn>
                </Card>
              )}

              {showHardship&&(
                <Card className="fade-in" style={{marginBottom:14,background:C.orangeBg,border:`1px solid ${C.orange}25`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <Icon name="shield" size={16} color={C.orange}/>
                    <span style={{fontWeight:800,fontSize:14}}>Hardship Assistance</span>
                  </div>
                  <p style={{fontSize:13,color:C.textSec,marginBottom:12,lineHeight:1.5,fontWeight:500}}>Available for 8-payment plans with 2+ late/missed payments. May be used up to twice per season. Completely anonymous.</p>
                  <Btn full small variant="outline" disabled>Not Currently Eligible</Btn>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:8,textAlign:"center",fontWeight:600}}>Requires: 8-pay plan + 2 missed payments</div>
                </Card>
              )}

              {plan.installments>1&&(
                <Card style={{marginBottom:14}}>
                  <div style={{fontWeight:800,fontSize:15,marginBottom:14}}>Payment Schedule</div>
                  {Array.from({length:plan.installments}).map((_,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:i<plan.installments-1?`1px solid ${C.borderLight}`:"none"}}>
                      <div style={{width:24,height:24,borderRadius:6,background:i<made?C.greenBg:i===made?C.accentGlow:C.bg,display:"flex",alignItems:"center",justifyContent:"center",marginRight:12,border:i>=made?`1px solid ${C.border}`:"none"}}>
                        {i<made?<Icon name="check" size={13} color={C.green}/>:<span style={{fontSize:10,fontWeight:800,color:i===made?C.accent:C.textMuted}}>{i+1}</span>}
                      </div>
                      <div style={{flex:1,fontSize:13,color:i<made?C.textMuted:C.text,fontWeight:i===made?700:500}}>
                        Payment {i+1}{i===made&&<span style={{marginLeft:8}}><Badge label="Next"/></span>}
                      </div>
                      <span style={{fontWeight:700,fontSize:13,color:i<made?C.green:C.text}}>{fmt(instAmt)}</span>
                    </div>
                  ))}
                </Card>
              )}
            </div>
          )}

          {pTab==="fund"&&(
            <div>
              <Card style={{marginBottom:14,padding:22}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontWeight:800,fontSize:17}}>Team Slush Fund</div>
                  <Badge label="Live" color={C.green} bg={C.greenBg}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:14}}>
                  <div><div style={{...T.caption,marginBottom:4}}>Total Fund</div><div style={{fontSize:22,fontWeight:900,letterSpacing:"-0.02em"}}>{fmt(totalFund)}</div></div>
                  <div><div style={{...T.caption,marginBottom:4}}>Spent</div><div style={{fontSize:22,fontWeight:900,color:C.green,letterSpacing:"-0.02em"}}>{fmt(totalSpent)}</div></div>
                </div>
                <Progress value={totalSpent} max={totalFund} height={6}/>
                <div style={{fontSize:12,color:C.textMuted,marginTop:8,fontWeight:600}}>{fmt(totalFund-totalSpent)} remaining</div>
              </Card>
              {DEMO_TXNS.map(t=>(
                <Card key={t.id} style={{marginBottom:6,padding:"14px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <CatIcon cat={t.category}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14}}>{t.desc}</div>
                      <div style={{fontSize:12,color:C.textMuted,marginTop:3,fontWeight:500}}>{t.date}</div>
                    </div>
                    <div style={{fontWeight:800,fontSize:14}}>-{fmt(t.amount)}</div>
                  </div>
                </Card>
              ))}
            </div>
          )}

          {pTab==="profile"&&(
            <div>
              <Card style={{marginBottom:14,padding:24,textAlign:"center"}}>
                <div style={{position:"relative",display:"inline-block"}}>
                  <Avatar name={parentName} size={72} src={parentPhoto}/>
                  <input type="file" accept="image/*" ref={photoInputRef} style={{display:"none"}} onChange={e=>handlePhotoUpload(e,setParentPhoto)}/>
                  <div onClick={()=>photoInputRef.current?.click()} style={{position:"absolute",bottom:-4,right:-4,width:28,height:28,borderRadius:8,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:`2px solid ${C.white}`}}>
                    <Icon name="camera" size={14} color={C.white}/>
                  </div>
                </div>
                <div style={{fontWeight:800,fontSize:18,marginTop:12}}>{parentName}</div>
                <div style={{color:C.textMuted,fontSize:13,fontWeight:500}}>Parent of {parentChild}</div>
                <div style={{marginTop:16,display:"flex",gap:8,justifyContent:"center"}}>
                  <Btn variant="outline" small>Edit Profile</Btn>
                  <Btn variant="outline" small><Icon name="users" size={13} color={C.text}/> Invite Family</Btn>
                </div>
              </Card>
              <Card style={{padding:18,marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:14,marginBottom:14}}>Payment Method</div>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${C.borderLight}`}}>
                  <Icon name={payMethod==="ach"?"bank":"creditCard"} size={20} color={C.steel}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{payMethod==="card"?"Visa ••4242":payMethod==="debit"?"Debit ••8821":"Chase ••6789"}</div>
                    <div style={{fontSize:12,color:C.textMuted,fontWeight:500}}>{payMethod==="ach"?"ACH Bank Transfer":"Card on file"}</div>
                  </div>
                  <Badge label="Active" color={C.green} bg={C.greenBg}/>
                </div>
              </Card>
              <Card style={{padding:18}}>
                <div style={{fontWeight:800,fontSize:14,marginBottom:14}}>Notifications</div>
                {[{label:"Email Alerts",val:notifEmail,set:setNotifEmail},{label:"SMS Alerts",val:notifSMS,set:setNotifSMS},{label:"Payment Reminders",val:notifPay,set:setNotifPay}].map((s,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:i<2?`1px solid ${C.borderLight}`:"none"}}>
                    <span style={{fontSize:14,fontWeight:600}}>{s.label}</span>
                    <div onClick={()=>s.set(!s.val)} style={{width:44,height:24,borderRadius:12,background:s.val?C.navy:C.border,padding:2,cursor:"pointer",transition:"background 0.15s"}}>
                      <div style={{width:20,height:20,borderRadius:10,background:C.white,boxShadow:C.shadow1,transform:s.val?"translateX(20px)":"translateX(0)",transition:"all 0.15s"}}/>
                    </div>
                  </div>
                ))}
              </Card>
            </div>
          )}
        </div>

        <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.white,borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0 20px",justifyContent:"space-around",zIndex:50}}>
          {[{icon:"home",label:"Home",tab:"dashboard"},{icon:"chart",label:"Fund",tab:"fund"},{icon:"settings",label:"Profile",tab:"profile"}].map(n=>(
            <button key={n.tab} onClick={()=>setPTab(n.tab)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 12px"}}>
              <Icon name={n.icon} size={20} color={pTab===n.tab?C.navy:C.textMuted}/>
              <span style={{fontSize:10,fontWeight:700,color:pTab===n.tab?C.navy:C.textMuted}}>{n.label}</span>
            </button>
          ))}
        </div>
        <div style={{height:80}}/>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
