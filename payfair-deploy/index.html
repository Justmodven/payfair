const Icon=({name,size=20,color=C.text,style:s={}})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={s}>
    {(icons[name]||"").split(" M").map((d,i)=><path key={i} d={i===0?d:"M"+d}/>)}
  </svg>
);

/* ══════════════════════════════════════════════════
   SHARED UI COMPONENTS
   ══════════════════════════════════════════════════ */
const Btn=({children,variant="primary",small,full,onClick,disabled,style:s={}})=>{
  const base={display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,borderRadius:10,fontWeight:600,cursor:disabled?'not-allowed':'pointer',transition:'all 0.2s',border:'none',fontSize:small?13:15,padding:small?'8px 16px':'14px 24px',width:full?'100%':'auto',opacity:disabled?0.4:1};
  const v={primary:{...base,background:C.accent,color:C.text},dark:{...base,background:C.bgDark,color:C.white},outline:{...base,background:'transparent',border:'1px solid '+C.border,color:C.text},ghost:{...base,background:'transparent',color:C.textSec},danger:{...base,background:C.red,color:C.white}};
  return <button onClick={disabled?undefined:onClick} style={{...(v[variant]||v.primary),...s}}>{children}</button>;
};

const Card=({children,dark,style:s={},onClick})=>(
  <div onClick={onClick} style={{background:dark?C.bgDark:C.bgCard,borderRadius:16,padding:20,border:dark?'none':'1px solid '+C.border,boxShadow:dark?'none':'0 1px 3px rgba(0,0,0,0.06)',cursor:onClick?'pointer':'default',transition:'all 0.2s',...s}}>{children}</div>
);

const Badge=({children,color=C.green,bg})=>(
  <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:bg||(color+'15'),color}}>{children}</span>
);

const Avatar=({name,size=40})=>{
  const i=name?name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase():'?';
  const colors=['#E7FF57','#00D4AA','#00B4D8','#F59E0B','#8B5CF6','#EF4444'];
  const c=colors[name?name.length%colors.length:0];
  return <div style={{width:size,height:size,borderRadius:size,background:c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.36,fontWeight:700,color:C.text,flexShrink:0}}>{i}</div>;
};

const Modal=({children,onClose,title,subtitle})=>(
  <div style={{position:'fixed',inset:0,zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'}} className="af">
    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(4px)'}} onClick={onClose}/>
    <div className="am" style={{position:'relative',background:C.bg,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:428,maxHeight:'90vh',overflow:'auto',paddingBottom:32}}>
      <div style={{padding:'20px 24px 0',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:C.bg,zIndex:1,paddingBottom:16,borderBottom:'1px solid '+C.border}}>
        <div><div style={{fontSize:18,fontWeight:700}}>{title}</div>{subtitle&&<div style={{fontSize:13,color:C.textMuted,marginTop:2}}>{subtitle}</div>}</div>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:32,background:C.bgSec,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><Icon name="x" size={16} color={C.textSec}/></button>
      </div>
      <div style={{padding:'20px 24px'}}>{children}</div>
    </div>
  </div>
);

const ProgressBar=({value,max=100,color=C.accent,height=6,bg=C.bgSec})=>(
  <div style={{height,borderRadius:height,background:bg,overflow:'hidden',width:'100%'}}>
    <div style={{height:'100%',borderRadius:height,background:color,width:Math.min(value/max*100,100)+'%',transition:'width 0.6s ease'}}/>
  </div>
);

const InputField=({label,value,onChange,placeholder,type="text",icon})=>(
  <div style={{marginBottom:16}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</label>}
    <div style={{position:'relative'}}>
      {icon&&<div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)'}}><Icon name={icon} size={16} color={C.textMuted}/></div>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:'100%',padding:'14px 16px',paddingLeft:icon?42:16,borderRadius:12,border:'1px solid '+C.border,background:C.bg,fontSize:15,color:C.text,transition:'border-color 0.2s'}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
    </div>
  </div>
);

/* ══════════════════════════════════════════════════
   VIRTUAL CARD — Amex Black Card
   ══════════════════════════════════════════════════ */
const VirtualCard=({balance=0,show=false,onToggle})=>(
  <div onClick={onToggle} style={{background:'linear-gradient(145deg,#1A1A2E 0%,#0D0D1A 30%,#16162A 60%,#0A0A14 100%)',borderRadius:20,padding:'28px 26px',color:C.white,position:'relative',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.06)',cursor:'pointer',minHeight:210}}>
    <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 40%,rgba(255,255,255,0.02) 70%,transparent 100%)'}}/>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',position:'relative',marginBottom:24}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:44,height:32,borderRadius:5,background:'linear-gradient(135deg,'+C.gold+' 0%,'+C.goldDark+' 40%,'+C.goldLight+' 50%,'+C.goldDark+' 60%,'+C.gold+' 100%)',boxShadow:'inset 0 1px 2px rgba(255,255,255,0.3),0 1px 3px rgba(0,0,0,0.3)',position:'relative'}}>
          <div style={{position:'absolute',inset:4,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:1}}>{[...Array(6)].map((_,i)=><div key={i} style={{background:'rgba(0,0,0,0.15)',borderRadius:1}}/>)}</div>
        </div>
        <Icon name="wifi" size={18} color="rgba(255,255,255,0.3)" style={{transform:'rotate(90deg)'}}/>
      </div>
      <div style={{fontSize:20,fontWeight:900,letterSpacing:'0.08em',background:'linear-gradient(135deg,'+C.gold+' 0%,'+C.goldLight+' 50%,'+C.gold+' 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>PF</div>
    </div>
    <div style={{position:'relative'}}>
      <div style={{fontSize:11,fontWeight:500,color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:4}}>Available Balance</div>
      <div style={{fontSize:34,fontWeight:800,letterSpacing:'-0.02em',background:'linear-gradient(135deg,rgba(255,255,255,0.95),rgba(255,255,255,0.7))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
        ${balance.toLocaleString('en-US',{minimumFractionDigits:2})}
      </div>
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:20,position:'relative'}}>
      <div style={{fontSize:13,letterSpacing:'0.15em',color:'rgba(255,255,255,0.35)',fontWeight:500}}>{show?'4242 8888 1234 5678':'•••• •••• •••• 5678'}</div>
      <div style={{padding:'5px 14px',borderRadius:20,background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.1)',fontSize:11,color:'rgba(255,255,255,0.5)',fontWeight:600,letterSpacing:'0.05em'}}>{show?'HIDE':'TAP TO REVEAL'}</div>
    </div>
  </div>
);

const StatCard=({label,value,change,dark})=>(
  <div style={{background:dark?C.bgDark:'#F8F9FA',borderRadius:14,padding:'16px 18px',flex:1,border:dark?'1px solid rgba(255,255,255,0.06)':'1px solid '+C.border}}>
    <div style={{fontSize:11,fontWeight:600,color:dark?'rgba(255,255,255,0.4)':C.textMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>{label}</div>
    <div style={{fontSize:22,fontWeight:800,color:dark?C.white:C.text,letterSpacing:'-0.02em'}}>{value}</div>
    {change!=null&&<div style={{fontSize:12,fontWeight:600,color:change>0?C.green:C.red,marginTop:4}}>{change>0?'+':''}{change}%</div>}
  </div>
);

const CollectionProgress=({collected=5184,total=7200})=>{
  const pct=Math.round(collected/total*100);
  return(<Card><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><div style={{fontSize:14,fontWeight:600}}>Collection Progress</div><div style={{fontSize:15,fontWeight:700,color:C.green}}>{pct}%</div></div><ProgressBar value={pct} color={C.green} height={8}/><div style={{display:'flex',justifyContent:'space-between',marginTop:8}}><span style={{fontSize:12,color:C.textMuted}}>${collected.toLocaleString()} collected</span><span style={{fontSize:12,color:C.textMuted}}>${total.toLocaleString()} goal</span></div></Card>);
};

const FamilyItem=({name,player,amount,status,onClick})=>(
  <div onClick={onClick} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0',borderBottom:'1px solid '+C.border,cursor:onClick?'pointer':'default'}}>
    <div style={{display:'flex',alignItems:'center',gap:14}}>
      <div style={{position:'relative'}}><Avatar name={name} size={44}/><div style={{position:'absolute',bottom:-1,right:-1,width:14,height:14,borderRadius:14,background:status==='paid'?C.green:status==='partial'?C.orange:C.red,border:'2px solid white'}}/></div>
      <div><div style={{fontSize:15,fontWeight:600}}>{name}</div><div style={{fontSize:12,color:C.textMuted}}>{player}</div></div>
    </div>
    <div style={{textAlign:'right'}}><div style={{fontSize:15,fontWeight:700}}>${amount}</div><Badge color={status==='paid'?C.green:status==='partial'?C.orange:C.red}>{status==='paid'?'Paid':status==='partial'?'Partial':'Pending'}</Badge></div>
  </div>
);

/* ══════════════════════════════════════════════════
   PAYMENT PLAN SELECTOR
   ══════════════════════════════════════════════════ */
const PaymentPlanSelector=({total=200,selected,onSelect})=>{
  const plans=[{id:1,n:1,fee:0,label:'Pay in Full',sub:'No convenience fee'},{id:2,n:2,fee:2.99,label:'Split in 2',sub:'2 payments'},{id:4,n:4,fee:3.99,label:'Split in 4',sub:'4 payments'},{id:8,n:8,fee:4.99,label:'Split in 8',sub:'8 payments'}];
  return(<div style={{display:'flex',flexDirection:'column',gap:10}}>{plans.map(p=>{const tf=p.fee*p.n;const pp=(total+tf)/p.n;const sel=selected===p.id;return(<div key={p.id} onClick={()=>onSelect(p.id)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px',borderRadius:14,border:'2px solid '+(sel?C.accent:C.border),background:sel?C.accent+'08':C.bg,cursor:'pointer',transition:'all 0.2s'}}><div style={{display:'flex',alignItems:'center',gap:14}}><div style={{width:22,height:22,borderRadius:22,border:'2px solid '+(sel?C.accent:C.border),display:'flex',alignItems:'center',justifyContent:'center'}}>{sel&&<div style={{width:12,height:12,borderRadius:12,background:C.accent}}/>}</div><div><div style={{fontSize:15,fontWeight:600}}>{p.label}</div><div style={{fontSize:12,color:C.textMuted}}>{p.sub}{p.fee>0&&' · $'+p.fee+' fee each'}</div></div></div><div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:700}}>${pp.toFixed(2)}</div>{p.n>1&&<div style={{fontSize:11,color:C.textMuted}}>x{p.n}</div>}</div></div>);})}</div>);
};

/* ══════════════════════════════════════════════════
   BOTTOM NAV
   ══════════════════════════════════════════════════ */
const BottomNav=({tabs,active,onTab})=>(
  <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:428,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(20px)',borderTop:'1px solid '+C.border,display:'flex',padding:'8px 0 env(safe-area-inset-bottom,8px)',zIndex:50}}>
    {tabs.map(t=>(
      <button key={t.id} onClick={()=>onTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'8px 0',background:'none',border:'none',cursor:'pointer'}}>
        <div style={{width:36,height:36,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:active===t.id?C.accent:'transparent',transition:'all 0.2s'}}><Icon name={t.icon} size={20} color={active===t.id?C.text:C.textMuted}/></div>

);

/* ══════════════════════════════════════════════════

      {modal==='event'&&<Modal title="Create Event" subtitle="Add to team calendar" onClose={()=>setModal(null)}><div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>{['practice','game','tournament','event'].map(t=><button key={t} onClick={()=>setEvType(t)} style={{padding:'8px 14px',borderRadius:20,border:'1px solid '+(evType===t?eventTypeColor(t):C.border),background:evType===t?eventTypeColor(t)+'15':'transparent',fontSize:13,fontWeight:evType===t?600:400,color:evType===t?eventTypeColor(t):C.textSec,cursor:'pointer'}}>{eventTypeLabel(t)}</button>)}</div><InputField label="Event Title" value={evTitle} onChange={setEvTitle} placeholder="e.g., Practice — Power Play Drills"/><div style={{display:'flex',gap:10}}><div style={{flex:1}}><InputField label="Date" value={evDate} onChange={setEvDate} type="date"/></div><div style={{flex:1}}><InputField label="Time" value={evTime} onChange={setEvTime} type="time"/></div></div><InputField label="Location" value={evLocation} onChange={setEvLocation} placeholder="Venue name and address" icon="mapPin"/><InputField label="Notes" value={evNotes} onChange={setEvNotes} placeholder="Any additional details"/><Btn variant="primary" full onClick={createEvent} disabled={!evTitle||!evDate}>Create Event</Btn></Modal>}

      {modal==='fund'&&<Modal title="Request Funds" subtitle="Send payment request to families" onClose={()=>setModal(null)}><InputField label="Title" value={frTitle} onChange={setFrTitle} placeholder="e.g., Tournament Entry Fee"/><InputField label="Amount per family" value={frAmount} onChange={setFrAmount} placeholder="$0.00" type="number" icon="dollar"/><InputField label="Due Date" value={frDue} onChange={setFrDue} type="date"/><div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>Category</div><div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>{['equipment','tournament','travel','uniforms','facility','other'].map(c=><button key={c} onClick={()=>setFrCategory(c)} style={{padding:'8px 14px',borderRadius:20,border:'1px solid '+(frCategory===c?C.accent:C.border),background:frCategory===c?C.accent+'15':'transparent',fontSize:13,fontWeight:frCategory===c?600:400,color:frCategory===c?C.text:C.textSec,cursor:'pointer',textTransform:'capitalize'}}>{c}</button>)}</div>{frAmount&&<div style={{padding:14,borderRadius:12,background:C.accent+'10',marginBottom:20}}><div style={{fontSize:12,color:C.textSec}}>Total collection from {families.length} families</div><div style={{fontSize:22,fontWeight:800}}>${(parseFloat(frAmount||0)*families.length).toFixed(2)}</div></div>}<Btn variant="primary" full disabled={!frTitle||!frAmount} onClick={()=>{setFrTitle('');setFrAmount('');setFrDue('');setFrCategory('equipment');setModal(null)}}>Send Request</Btn></Modal>}

      {modal==='notify'&&<Modal title="Notifications" subtitle="3 new updates" onClose={()=>setModal(null)}>{[{icon:'dollar',text:'Sarah Martinez paid $185.00',sub:'Tournament Fee — Paid in full',time:'2h ago',color:C.green},{icon:'calendar',text:'Frostbite Classic — schedule posted',sub:'March 14, 7:00 AM · IceWorks Rink',time:'5h ago',color:C.orange},{icon:'poll',text:'2 new poll responses received',sub:'Team dinner restaurant preference',time:'1d ago',color:C.blue}].map((n,i)=><div key={i} style={{display:'flex',gap:12,padding:'14px 0',borderBottom:'1px solid '+C.border}}><div style={{width:40,height:40,borderRadius:12,background:n.color+'15',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name={n.icon} size={18} color={n.color}/></div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{n.text}</div><div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{n.sub}</div></div><span style={{fontSize:11,color:C.textMuted,flexShrink:0}}>{n.time}</span></div>)}</Modal>}

      <MessagesModal/><EventDetailModal/>
    </div>
  );

  /* ═══ PARENT ═══ */
  if(role==='parent')return(
    <div style={{maxWidth:428,margin:'0 auto',minHeight:'100vh',background:C.bg,position:'relative'}}>
      <div style={{padding:'16px 20px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(20px)',zIndex:40}}>
        <div><div style={{fontSize:12,color:C.textMuted,fontWeight:500}}>{getGreeting()}</div><div style={{fontSize:20,fontWeight:700}}>Jennifer Chen</div></div>
        <button onClick={()=>setModal('parentNotify')} style={{width:40,height:40,borderRadius:12,background:C.bgSec,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative'}}><Icon name="bell" size={18} color={C.textSec}/><div style={{position:'absolute',top:8,right:8,width:8,height:8,borderRadius:8,background:C.red,border:'2px solid white'}}/></button>
      </div>
      <div style={{padding:'0 20px 100px',paddingTop:8}}>

        {pTab==='home'&&<div className="af">
          <Card dark style={{marginBottom:16}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}><div><div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'0.1em'}}>Slush Fund Balance</div><div style={{fontSize:32,fontWeight:800,color:C.white,marginTop:4}}>${parentTotal.toFixed(2)}</div></div><Badge color={C.orange} bg="rgba(245,158,11,0.15)">2 of 4 paid</Badge></div><ProgressBar value={parentPaid} max={parentTotal} color={C.accent} height={8} bg="rgba(255,255,255,0.1)"/><div style={{display:'flex',justifyContent:'space-between',marginTop:8}}><span style={{fontSize:12,color:'rgba(255,255,255,0.4)'}}>${parentPaid.toFixed(2)} paid</span><span style={{fontSize:12,color:'rgba(255,255,255,0.4)'}}>${(parentTotal-parentPaid).toFixed(2)} remaining</span></div><div style={{marginTop:16,padding:'12px 16px',borderRadius:10,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:12,color:'rgba(255,255,255,0.5)'}}>Next payment due</div><div style={{fontSize:15,fontWeight:700,color:C.white}}>$46.25 · Mar 15</div></div><Btn variant="primary" small onClick={()=>setPTab('fund')}>Pay Now</Btn></div></Card>
          <div style={{display:'flex',gap:10,marginBottom:20}}>{[{icon:'calendar',label:'Calendar',action:()=>setPTab('calendar')},{icon:'poll',label:'Polls',action:()=>setPTab('polls')},{icon:'dollar',label:'Payments',action:()=>setPTab('fund')},{icon:'messageCircle',label:'Messages',action:()=>setModal('messages')}].map((a,i)=><button key={i} onClick={a.action} style={{flex:1,padding:'16px 0',borderRadius:14,background:C.bgSec,border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6}}><Icon name={a.icon} size={20} color={C.textSec}/><span style={{fontSize:11,fontWeight:600,color:C.textSec}}>{a.label}</span></button>)}</div>
          <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:C.textMuted,marginBottom:12}}>Upcoming Events</div>{sortedEvents.slice(0,3).map(ev=><div key={ev.id} style={{display:'flex',alignItems:'center',gap:14,padding:'12px 0',borderBottom:'1px solid '+C.border}}><div style={{width:40,height:40,borderRadius:10,background:eventTypeColor(ev.type)+'15',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="calendar" size={16} color={eventTypeColor(ev.type)}/></div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{ev.title}</div><div style={{fontSize:12,color:C.textMuted}}>{fmtDate(ev.date)} · {ev.time}</div></div></div>)}
          <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:24,padding:'8px 0'}}><button style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:C.textMuted,display:'flex',alignItems:'center',gap:4}}><Icon name="heart" size={13} color={C.textMuted}/> Help a teammate</button><span style={{color:C.border}}>|</span><button style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:C.textMuted,display:'flex',alignItems:'center',gap:4}}><Icon name="shield" size={13} color={C.textMuted}/> Need assistance?</button></div>
        </div>}

        {pTab==='calendar'&&<div className="af"><div style={{fontSize:18,fontWeight:700,marginBottom:20}}>Team Calendar</div>{sortedEvents.map(ev=><Card key={ev.id} style={{marginBottom:12,padding:16}} onClick={()=>setModal({type:'eventDetail',event:ev})}><div style={{display:'flex',alignItems:'center',gap:14}}><div style={{width:44,height:44,borderRadius:12,background:eventTypeColor(ev.type)+'15',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name={ev.type==='game'?'target':'calendar'} size={18} color={eventTypeColor(ev.type)}/></div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{ev.title}</div><div style={{fontSize:12,color:C.textMuted}}>{fmtDate(ev.date)} · {ev.time}</div>{ev.location&&<div style={{fontSize:12,color:C.textSec,marginTop:2,display:'flex',alignItems:'center',gap:4}}><Icon name="mapPin" size={11} color={C.textMuted}/>{ev.location}</div>}</div><Badge color={eventTypeColor(ev.type)}>{eventTypeLabel(ev.type)}</Badge></div></Card>)}</div>}

        {pTab==='polls'&&<div className="af"><div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Team Polls</div><div style={{fontSize:13,color:C.textMuted,marginBottom:20}}>Help your manager make the best decisions.</div>{polls.filter(p=>p.active).map(p=>{const totalV=p.options.reduce((s,o)=>s+o.votes,0);return(<Card key={p.id} style={{marginBottom:14,padding:18}}><div style={{fontSize:15,fontWeight:600,marginBottom:14}}>{p.question}</div><div style={{display:'flex',flexDirection:'column',gap:8}}>{p.options.map((opt,i)=><button key={i} onClick={()=>setPolls(polls.map(pp=>pp.id===p.id?{...pp,options:pp.options.map((o,j)=>j===i?{...o,votes:o.votes+1}:o)}:pp))} style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderRadius:12,border:'1px solid '+C.border,background:C.bg,cursor:'pointer',width:'100%',textAlign:'left'}}><div style={{width:20,height:20,borderRadius:20,border:'2px solid '+C.border,flexShrink:0}}/><span style={{fontSize:14,fontWeight:500}}>{opt.text}</span></button>)}</div><div style={{fontSize:12,color:C.textMuted,marginTop:10}}>{totalV} votes so far</div></Card>)})}{polls.filter(p=>!p.active).map(p=><Card key={p.id} style={{marginBottom:10,padding:16,opacity:0.6}}><div style={{fontSize:14,fontWeight:600}}>{p.question}</div><div style={{fontSize:12,color:C.green,fontWeight:600,marginTop:4}}>✓ Decided: {p.decided}</div></Card>)}</div>}

        {pTab==='fund'&&<div className="af"><div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Payment Plan</div><div style={{fontSize:13,color:C.textMuted,marginBottom:20}}>Tyler (#3) — Team Illinois AAA</div><Card style={{marginBottom:20,padding:20}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}><div><div style={{fontSize:12,color:C.textMuted}}>Total due</div><div style={{fontSize:28,fontWeight:800}}>${parentTotal.toFixed(2)}</div></div><div style={{textAlign:'right'}}><div style={{fontSize:12,color:C.textMuted}}>Paid so far</div><div style={{fontSize:28,fontWeight:800,color:C.green}}>${parentPaid.toFixed(2)}</div></div></div><ProgressBar value={parentPaid} max={parentTotal} color={C.green} height={8}/></Card><div style={{fontSize:14,fontWeight:600,marginBottom:12}}>Choose your payment plan</div><PaymentPlanSelector total={parentTotal-parentPaid} selected={parentPlan} onSelect={setParentPlan}/>{parentPlan>0&&<Btn variant="primary" full style={{marginTop:20}} onClick={()=>alert('Payment processing via Stripe — coming soon!')}><Icon name="creditCard" size={16}/> Continue to Payment</Btn>}</div>}

        {pTab==='profile'&&<div className="af"><div style={{fontSize:18,fontWeight:700,marginBottom:20}}>My Account</div><div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}><Avatar name="Jennifer Chen" size={64}/><div><div style={{fontSize:18,fontWeight:700}}>Jennifer Chen</div><div style={{fontSize:13,color:C.textMuted}}>jennifer.chen@email.com</div></div></div>{[{icon:'user',label:'Personal Information'},{icon:'creditCard',label:'Payment Methods'},{icon:'bell',label:'Notification Preferences'},{icon:'shield',label:'Privacy & Security'},{icon:'messageCircle',label:'Help & Support'}].map((item,i)=><button key={i} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 0',background:'none',border:'none',borderBottom:'1px solid '+C.border,cursor:'pointer'}}><div style={{display:'flex',alignItems:'center',gap:14}}><div style={{width:40,height:40,borderRadius:12,background:C.bgSec,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name={item.icon} size={18} color={C.textSec}/></div><span style={{fontSize:15,fontWeight:500,color:C.text}}>{item.label}</span></div><Icon name="chevRight" size={16} color={C.textMuted}/></button>)}<button onClick={()=>setRole(null)} style={{width:'100%',padding:16,marginTop:24,borderRadius:12,background:C.bgSec,border:'none',color:C.textSec,fontSize:14,fontWeight:500,cursor:'pointer'}}>Sign Out</button></div>}
      </div>
      <BottomNav tabs={parentTabs} active={pTab} onTab={setPTab}/>

      {modal==='parentNotify'&&<Modal title="Notifications" subtitle="2 new updates" onClose={()=>setModal(null)}>{[{icon:'dollar',text:'Payment reminder: $46.25 due Mar 15',sub:'Frostbite Classic Tournament Fee',time:'1h ago',color:C.orange},{icon:'calendar',text:'Practice time updated for Tuesday',sub:'Now 6:30 PM at Skate Zone',time:'4h ago',color:C.blue},{icon:'poll',text:'New poll: Team dinner preference',sub:'Vote now to help Coach decide',time:'1d ago',color:C.purple}].map((n,i)=><div key={i} style={{display:'flex',gap:12,padding:'14px 0',borderBottom:'1px solid '+C.border}}><div style={{width:40,height:40,borderRadius:12,background:n.color+'15',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name={n.icon} size={18} color={n.color}/></div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{n.text}</div><div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{n.sub}</div></div><span style={{fontSize:11,color:C.textMuted,flexShrink:0}}>{n.time}</span></div>)}</Modal>}

      <MessagesModal/><EventDetailModal/>
    </div>
  );
  return null;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
